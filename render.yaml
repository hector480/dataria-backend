services:
  - type: web
    name: dataria-orchestrator
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PRSP_BASE
        value: https://payment-system-prsp.onrender.com
      - key: HTTP_TIMEOUT
        value: "180"
